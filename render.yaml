services:
  - type: web
    name: ever-after-wedding
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: node .next/standalone/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.15.0
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
